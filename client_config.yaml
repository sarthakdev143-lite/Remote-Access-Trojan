# TLS Demo Client Configuration (#7)
# server:
#   host: "127.0.0.1"
#   port: 6767
#   server_name: "localhost"
#   ca_file: "ca.crt"
server:
  host: "johnthehecker143-47209.portmap.host"
  port: 47209
  server_name: "localhost"
  ca_file: "ca.crt"

auth:
  token: "changeme-token-1234"

tls:
  use_client_cert: false
  client_cert: "client.crt"
  client_key: "client.key"

client:
  group: "default"      # client group tag (#8)

reconnect:              # exponential backoff (#13)
  initial_delay: 1.0
  max_delay: 60.0
  multiplier: 2.0
  jitter: 0.3

protocol:
  compression: true
  compress_threshold: 512
