version: "3.9"

services:
  tls-server:
    build: .
    container_name: tls_server
    restart: unless-stopped
    ports:
      - "6767:6767"   # TLS client connections
      - "8080:8080"   # Web dashboard
    volumes:
      - ./certs:/app/certs:ro          # mount your own certs
      - ./server.log:/app/server.log   # persist logs
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN:-changeme-token-1234}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8080),2); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
